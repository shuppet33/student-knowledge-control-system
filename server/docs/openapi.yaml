openapi: 3.1.0

info:
  title: Student Knowledge Control System API
  description: API системы контроля знаний студентов
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Локальный сервер

tags:
  - name: Auth
    description: Авторизация и управление сессией
  - name: Admin Users
    description: Защищено сервером — доступ только для роли admin
  - name: Admin Groups
    description: Защищено сервером — доступ только для роли admin
  - name: Admin Students
    description: Защищено сервером — доступ только для роли admin
  - name: Admin Subjects
    description: Защищено сервером — доступ только для роли admin
  - name: Admin Teachers
    description: Защищено сервером — доступ только для роли admin
  - name: Admin Tests
    description: Защищено сервером — доступ только для роли admin

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Войти в систему
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Авторизация выполнена
          headers:
            Set-Cookie:
              description: HttpOnly cookie с refresh-токеном
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/me:
    get:
      tags: [Auth]
      summary: Получить текущего пользователя
      operationId: getCurrentUser
      responses:
        '200':
          description: Данные активного пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Обновить access-токен
      operationId: refreshAccessToken
      responses:
        '200':
          description: Новый access-токен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Выйти из системы
      operationId: logout
      responses:
        '200':
          description: Выход выполнен
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
                    example: true

  /admin/users:
    get:
      tags: [Admin Users]
      summary: Получить активных пользователей
      operationId: getUsers
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [Admin Users]
      summary: Создать пользователя
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/users/{id}:
    delete:
      tags: [Admin Users]
      summary: Выполнить soft delete пользователя
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/groups:
    get:
      tags: [Admin Groups]
      summary: Получить активные учебные группы
      operationId: getGroups
      responses:
        '200':
          description: Список групп
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [Admin Groups]
      summary: Создать учебную группу
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameRequest'
      responses:
        '201':
          description: Группа создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/groups/{id}:
    delete:
      tags: [Admin Groups]
      summary: Выполнить soft delete группы
      operationId: deleteGroup
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/groups/{groupId}/students:
    post:
      tags: [Admin Groups]
      summary: Добавить студента в группу
      operationId: addStudentToGroup
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddStudentRequest'
      responses:
        '201':
          description: Связь студента с группой создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentGroup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/groups/{groupId}/students/{studentId}:
    delete:
      tags: [Admin Groups]
      summary: Удалить студента из группы
      operationId: removeStudentFromGroup
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/groups/{groupId}/subjects:
    get:
      tags: [Admin Groups]
      summary: Получить предметы группы
      operationId: getGroupSubjects
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: Список предметов группы
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [Admin Groups]
      summary: Назначить предмет группе
      operationId: addSubjectToGroup
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSubjectRequest'
      responses:
        '201':
          description: Связь предмета с группой создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectGroup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/groups/{groupId}/subjects/{subjectId}:
    delete:
      tags: [Admin Groups]
      summary: Удалить предмет у группы
      operationId: removeSubjectFromGroup
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/SubjectId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/students:
    get:
      tags: [Admin Students]
      summary: Получить активных студентов
      operationId: getStudents
      responses:
        '200':
          description: Студенты, сгруппированные по учебным группам
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentsByGroup'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/subjects:
    get:
      tags: [Admin Subjects]
      summary: Получить активные предметы
      operationId: getSubjects
      responses:
        '200':
          description: Список предметов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [Admin Subjects]
      summary: Создать предмет
      operationId: createSubject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameRequest'
      responses:
        '201':
          description: Предмет создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/subjects/{id}:
    get:
      tags: [Admin Subjects]
      summary: Получить предмет
      operationId: getSubject
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Данные предмета
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      tags: [Admin Subjects]
      summary: Изменить название предмета
      operationId: updateSubject
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameRequest'
      responses:
        '200':
          description: Предмет обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags: [Admin Subjects]
      summary: Выполнить soft delete предмета
      operationId: deleteSubject
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/subjects/{id}/groups:
    get:
      tags: [Admin Subjects]
      summary: Получить группы предмета
      operationId: getSubjectGroups
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Группы, которым доступен предмет
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/subjects/{id}/teachers:
    get:
      tags: [Admin Subjects]
      summary: Получить преподавателей предмета
      operationId: getSubjectTeachers
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Преподаватели, назначенные на предмет
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Teacher'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/teachers:
    get:
      tags: [Admin Teachers]
      summary: Получить активных преподавателей
      operationId: getTeachers
      responses:
        '200':
          description: Список преподавателей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Teacher'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/teachers/{id}/subjects:
    get:
      tags: [Admin Teachers]
      summary: Получить предметы преподавателя
      operationId: getTeacherSubjects
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Список предметов преподавателя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [Admin Teachers]
      summary: Назначить предмет преподавателю
      operationId: addSubjectToTeacher
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSubjectRequest'
      responses:
        '201':
          description: Связь преподавателя с предметом создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherSubject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/teachers/{teacherId}/subjects/{subjectId}:
    delete:
      tags: [Admin Teachers]
      summary: Удалить предмет у преподавателя
      operationId: removeSubjectFromTeacher
      parameters:
        - $ref: '#/components/parameters/TeacherId'
        - $ref: '#/components/parameters/SubjectId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/teachers/{teacherId}/subjects/{subjectId}/tests:
    get:
      tags: [Admin Teachers]
      summary: Получить тесты преподавателя по предмету
      operationId: getTeacherSubjectTests
      parameters:
        - $ref: '#/components/parameters/TeacherId'
        - $ref: '#/components/parameters/SubjectId'
      responses:
        '200':
          description: Список тестов преподавателя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeacherTest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/tests:
    get:
      tags: [Admin Tests]
      summary: Получить все активные тесты системы
      operationId: getTests
      responses:
        '200':
          description: Тесты, сгруппированные по предметам
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminTestGroup'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /admin/tests/{id}:
    delete:
      tags: [Admin Tests]
      summary: Выполнить soft delete теста
      description: Дополнительно устанавливает is_active = false
      operationId: deleteTest
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    StudentId:
      name: studentId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    TeacherId:
      name: teacherId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    SubjectId:
      name: subjectId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Требуется корректный access-токен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Сущность не найдена
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Связь или сущность уже существует
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    SuccessMessage:
      description: Операция выполнена
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Message'

  schemas:
    Id:
      type: integer
      format: int64
      minimum: 1
      example: 1

    Role:
      type: string
      enum: [admin, teacher, student]

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@example.com
        password:
          type: string
          format: password
          minLength: 1

    AuthResponse:
      type: object
      required: [role, token]
      properties:
        role:
          $ref: '#/components/schemas/Role'
        token:
          type: string
          description: JWT access-токен

    CurrentUser:
      type: object
      required: [id, email, role, full_name]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        full_name:
          type: string

    CreateUserRequest:
      type: object
      additionalProperties: false
      required: [email, password, role, full_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 1
        role:
          $ref: '#/components/schemas/Role'
        full_name:
          type: string
          minLength: 1
          example: Иванов Иван Иванович

    User:
      type: object
      required: [id, email, role, full_name, created_at]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        full_name:
          type: string
        created_at:
          type: string
          format: date-time

    Teacher:
      type: object
      required: [id, email, full_name, created_at]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        email:
          type: string
          format: email
        full_name:
          type: string
        created_at:
          type: string
          format: date-time

    Student:
      type: object
      required: [id, email, full_name, created_at]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        email:
          type: string
          format: email
        full_name:
          type: string
        created_at:
